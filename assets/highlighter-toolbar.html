<div class="highlight-toolbar" id="highlight-toolbar" hidden data-no-highlight>
  <label for="highlight-color" title="自定义高亮颜色 · Custom highlight color">颜色</label>
  <input id="highlight-color" type="color" value="#fff176" aria-label="自定义高亮颜色">
  <button id="highlight-apply" type="button">高亮 Highlight</button>
  <button id="highlight-remove" type="button" disabled>删除 Remove</button>
  <button id="highlight-clear" type="button">全部清除 Clear all</button>
  <span class="highlight-status" id="highlight-status">选择文字即可高亮 · Select text to highlight</span>
</div>

<div class="highlight-locator" id="highlight-locator" data-no-highlight>
  <button id="highlight-prev" type="button" disabled title="上一个高亮 · Previous highlight">Prev</button>
  <span class="highlight-count" id="highlight-count">0 highlights</span>
  <button id="highlight-next" type="button" disabled title="下一个高亮 · Next highlight">Next</button>
</div>
